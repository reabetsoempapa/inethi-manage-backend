version: "3.9"

services:
  db:
    image: mysql:latest
    container_name: inethi-manage-mysql
    environment:
      MYSQL_DATABASE: "manage"
      MYSQL_USER: "inethi"
      MYSQL_PASSWORD: "iNethi2023#"
      MYSQL_ROOT_PASSWORD: "iNethi2023#"
    volumes:
      - manage_db:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build:
      context: .
    container_name: inethi-manage
    depends_on:
      - db
    environment:
      DJANGO_SECRET_KEY: "your_secret_key"
      DJANGO_DEBUG: "True"
      DB_NAME: "manage"
      DB_USER: "inethi"
      DB_PASSWORD: "iNethi2023#"
      DB_HOST: "db"
      DB_PORT: "3306"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["gunicorn", "backend.wsgi:application", "--bind", "0.0.0.0:8000"]

volumes:
  manage_db:
